services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - rails_storage:/rails/storage
    extra_hosts:
      # Lets host.docker.internal resolve to the host running Ollama (Linux).
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  rails_storage:
